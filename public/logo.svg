<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Arrow markers for clockwise circular arrows -->
    <marker id="mb" viewBox="0 0 12 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 12,5 0,10" fill="#1565C0"/>
    </marker>
    <marker id="my" viewBox="0 0 12 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 12,5 0,10" fill="#F9A825"/>
    </marker>
    <marker id="mg" viewBox="0 0 12 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 12,5 0,10" fill="#2E7D32"/>
    </marker>
    <marker id="mo" viewBox="0 0 12 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 12,5 0,10" fill="#BF360C"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="500" height="500" fill="white"/>

  <!-- Circular arrows (clockwise, each ~75°, 4 arcs with gaps at cardinal-45° points) -->
  <!-- Center: 250,250  Radius: 200 -->
  <!-- Blue arc: 280° → 350° (top, clockwise) -->
  <!-- 280°: x=250+200*cos(280°)=250+34.7=285, y=250+200*sin(280°)=250-197=53 -->
  <!-- 350°: x=250+200*cos(350°)=250+197=447, y=250+200*sin(350°)=250-35=215 -->
  <path d="M 285,53 A 200,200 0 0,1 447,215"
        stroke="#1565C0" stroke-width="36" fill="none" stroke-linecap="round"
        marker-end="url(#mb)"/>

  <!-- Yellow arc: 10° → 80° (right, clockwise) -->
  <!-- 10°: x=250+200*cos(10°)=447, y=250+200*sin(10°)=285 -->
  <!-- 80°: x=250+200*cos(80°)=285, y=250+200*sin(80°)=447 -->
  <path d="M 447,285 A 200,200 0 0,1 285,447"
        stroke="#F9A825" stroke-width="36" fill="none" stroke-linecap="round"
        marker-end="url(#my)"/>

  <!-- Green arc: 100° → 170° (bottom, clockwise) -->
  <!-- 100°: x=250+200*cos(100°)=215, y=250+200*sin(100°)=447 -->
  <!-- 170°: x=250+200*cos(170°)=53, y=250+200*sin(170°)=285 -->
  <path d="M 215,447 A 200,200 0 0,1 53,285"
        stroke="#2E7D32" stroke-width="36" fill="none" stroke-linecap="round"
        marker-end="url(#mg)"/>

  <!-- Orange/Red arc: 190° → 260° (left, clockwise) -->
  <!-- 190°: x=250+200*cos(190°)=53, y=250+200*sin(190°)=215 -->
  <!-- 260°: x=250+200*cos(260°)=215, y=250+200*sin(260°)=53 -->
  <path d="M 53,215 A 200,200 0 0,1 215,53"
        stroke="#BF360C" stroke-width="36" fill="none" stroke-linecap="round"
        marker-end="url(#mo)"/>

  <!-- Corner icons at gaps -->
  <!-- Top gap (~270°): book/learning icon -->
  <circle cx="250" cy="45" r="26" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="250" y="55" text-anchor="middle" font-size="26">📖</text>

  <!-- Right gap (~0°): question/inquiry icon -->
  <circle cx="455" cy="250" r="26" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="455" y="260" text-anchor="middle" font-size="26">❓</text>

  <!-- Bottom gap (~90°): map/exploration icon -->
  <circle cx="250" cy="455" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="250" y="465" text-anchor="middle" font-size="26">🗺️</text>

  <!-- Left gap (~180°): safety/protection icon -->
  <circle cx="45" cy="250" r="26" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="45" y="260" text-anchor="middle" font-size="26">✊</text>

  <!-- Shield shape (heraldic) -->
  <path d="M250,120 L355,155 L360,280 Q355,390 250,420 Q145,390 140,280 L145,155 Z"
        fill="#DDEEFF" stroke="#1565C0" stroke-width="7" stroke-linejoin="round"/>

  <!-- Shield inner highlight -->
  <path d="M250,135 L340,165 L344,278 Q340,375 250,402 Q160,375 156,278 L160,165 Z"
        fill="url(#shieldGrad)" stroke="none"/>
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF5FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- SAFE text -->
  <text x="250" y="295" text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="82" font-weight="900" fill="#1565C0" letter-spacing="-1">SAFE</text>

  <!-- 프로젝트 text -->
  <text x="250" y="345" text-anchor="middle"
        font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        font-size="36" font-weight="700" fill="#2E7D32">프로젝트</text>

  <!-- 안전문해력 향상 text -->
  <text x="250" y="385" text-anchor="middle"
        font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        font-size="20" fill="#1565C0">안전문해력 향상</text>
</svg>
